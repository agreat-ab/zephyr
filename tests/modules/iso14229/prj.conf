# Enable UDS (ISO 14229)
CONFIG_ISO14229=y

# Enable internal reset helper for tests
CONFIG_ISO14229_TEST=y

# Enable CAN stack
CONFIG_CAN=y

# Logging (optional but useful for debugging)
CONFIG_LOG=y

# Immediate logging
CONFIG_LOG_MODE_DEFERRED=n
CONFIG_LOG_BACKEND_SHOW_COLOR=n

#Ztest features are enabled
CONFIG_ZTEST=y
CONFIG_ZTEST_MOCKING=y
CONFIG_ZTEST_ASSERT_VERBOSE=1

# Optional: helpful when debugging
CONFIG_MAIN_STACK_SIZE=2048

# Dynamic memory pool for k_malloc
CONFIG_HEAP_MEM_POOL_SIZE=4096

# UDS CAN transport settings
CONFIG_UDS_CAN_BITRATE=500000
CONFIG_UDS_CAN_SAMPLEPOINT=750

# Enable kernel features needed by UDS tests
CONFIG_MULTITHREADING=y
CONFIG_TIMESLICING=y
CONFIG_THREAD_STACK_INFO=y

# Prevent automatic sys-init of the ISO14229 module. Tests want manual init.
CONFIG_ISO14229_SYS_INIT=n

# native_sim doesn’t support k_thread_daemonize()
CONFIG_ISO14229_DAEMONIZE_THREAD=n

# Ensure test logs do NOT get formatted in a way that confuses Twister
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_LOG_BACKEND_FORMAT_TIMESTAMP=y

# Disable Zephyr boot banner (required by Twister on 3.7.x)
CONFIG_BOOT_BANNER=n
CONFIG_LOG_PRINTK=y
CONFIG_PRINTK=y
CONFIG_EARLY_CONSOLE=y
